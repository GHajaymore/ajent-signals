name: iOS Build

# Runs on every push that touches mobile/iOS files (no GitHub UI button-hunting
# required), plus still available as a manual "Run workflow" button. It only
# ever builds/exports artifacts for download — nothing here submits to Apple.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ios-build.yml'
      - 'app/**'
      - 'assets/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'scripts/build-mobile-www.js'
      - 'ios/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    env:
      HAS_SIGNING: ${{ secrets.IOS_DIST_CERT_P12 != '' && secrets.IOS_PROVISION_PROFILE != '' }}
      HAS_TESTFLIGHT: ${{ secrets.APP_STORE_CONNECT_API_KEY != '' && secrets.APP_STORE_CONNECT_KEY_ID != '' && secrets.APP_STORE_CONNECT_ISSUER_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build mobile web assets
        run: npm run build:www

      - name: Add or sync iOS platform
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            npx cap sync ios
          fi

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build for iOS Simulator (sanity check, no signing needed)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Debug -sdk iphonesimulator \
            -derivedDataPath build-sim build

      - name: Commit generated native project if new
        run: |
          git config user.name "GHajaymore"
          git config user.email "GHajaymore@users.noreply.github.com"
          git add ios
          git diff --cached --quiet || git commit -m "Add/update generated Capacitor iOS project [ci]"
          git push

      - name: Import signing certificate and provisioning profile
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo "${{ secrets.IOS_DIST_CERT_P12 }}" | tr -d '[:space:]' | base64 --decode > $RUNNER_TEMP/cert.p12
          echo "p12 size: $(wc -c < $RUNNER_TEMP/cert.p12) bytes"
          file $RUNNER_TEMP/cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/cert.p12 -P "${{ secrets.IOS_DIST_CERT_PASSWORD }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISION_PROFILE }}" | tr -d '[:space:]' | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          echo "profile size: $(wc -c < ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision) bytes"

      - name: Archive and export signed .ipa
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: |
          cd ios/App
          cat > ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>376A6B2QLU</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.AjMore.ajentsignals</key>
              <string>Ajent Signals App Store</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -archivePath build-release/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Ajent Signals App Store" \
            DEVELOPMENT_TEAM=376A6B2QLU \
            archive

          xcodebuild -exportArchive \
            -archivePath build-release/App.xcarchive \
            -exportPath build-release/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload signed .ipa
        if: ${{ env.HAS_SIGNING == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: AjentSignals-ipa
          path: ios/App/build-release/export/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: ${{ env.HAS_SIGNING == 'true' && env.HAS_TESTFLIGHT == 'true' }}
        run: |
          mkdir -p ~/private_keys ~/.appstoreconnect/private_keys
          KEY_FILE=~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | tr -d '[:space:]' | base64 --decode > "$KEY_FILE"
          cp "$KEY_FILE" ~/.appstoreconnect/private_keys/

          echo "--- key file diagnostics (no secret content shown) ---"
          wc -c < "$KEY_FILE"
          wc -l < "$KEY_FILE"
          head -1 "$KEY_FILE"
          tail -1 "$KEY_FILE"
          echo "issuer id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          echo "key id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}"
          echo "-------------------------------------------------------"

          IPA_PATH=$(find ios/App/build-release/export -name "*.ipa" | head -1)
          echo "Uploading $IPA_PATH to TestFlight..."

          set -o pipefail
          xcrun altool --upload-app -f "$IPA_PATH" -t ios \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --verbose 2>&1 | tee /tmp/altool.log | tail -100
          RESULT=$?
          echo "altool exit code: $RESULT"
          exit $RESULT
